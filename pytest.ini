[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
qt_api = pyqt6
timeout = 300
timeout_method = thread

markers =
    # Test Type Markers
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, filesystem, real components)
    e2e: End-to-end tests (full workflows)
    ui: UI tests
    qt: Qt UI tests

    # Speed Markers
    slow: Slow running tests (>30 seconds)
    fast: Fast tests (<5 seconds)

    # Build Markers
    pyinstaller: PyInstaller integration tests
    build: Build-related tests

    # Component Markers
    database: Database-related tests
    dispatch: Dispatch/orchestration tests
    conversion: File conversion tests
    backend: Backend tests (FTP, Email, Copy)
    gui: GUI component tests

    # Workflow Markers
    workflow: Complete workflow tests
    upgrade: Database upgrade tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
