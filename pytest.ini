[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Default: run tests in parallel for speed (-n auto uses all CPUs)
# Qt tests should be run with -n0: pytest tests/unit/interface/qt/ -n0
addopts = --tb=short --strict-markers -n auto --dist loadscope --basetemp=.pytest_temp
# Redirect xdist worker temp dirs and pytest tmp_path to project-space instead
# of /tmp. The user's /tmp has a tight per-user quota (~12.7 MB).
# Keep only failed-test temps to avoid accumulating disk usage.
tmp_path_retention_policy = failed
qt_api = pyqt5
# Note: QT_QPA_PLATFORM=offscreen is set in conftest files for Qt tests
# pytest-timeout applies per test (includes setup/call/teardown because
# timeout_func_only=False by default). Using `signal` on POSIX allows a single
# timed-out test to fail while the rest of the suite continues.
timeout = 120
timeout_method = signal

markers =
    # Test Type Markers
    smoke: Quick smoke tests to verify basic functionality
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, filesystem, real components)
    e2e: End-to-end tests (full workflows)
    ui: UI tests
    qt: Qt UI tests (use real Qt widgets in offscreen mode)

    # Speed Markers
    slow: Slow running tests (>30 seconds)
    fast: Fast tests (<5 seconds)

    # Build Markers
    pyinstaller: PyInstaller integration tests
    build: Build-related tests

    # Component Markers
    database: Database-related tests
    dispatch: Dispatch/orchestration tests
    conversion: File conversion tests
    backend: Backend tests (FTP, Email, Copy)
    gui: GUI component tests

    # Workflow Markers
    workflow: Complete workflow tests
    upgrade: Database upgrade tests

    # Test Behavior Markers
    error_recovery: Tests that verify error recovery (exempt from fail-fast)

    # New Test Category Markers (Added March 2026)
    performance: Performance benchmark tests
    security: Security validation tests
    migration: Database migration tests
    plugin: Plugin system tests
    stress: Stress/load tests
    compatibility: Backward compatibility tests
    backward_compatibility: Tests verifying drop-in replacement capability
    edi: EDI file processing tests

    # ODBC Marker
    odbc: Tests that require AS400 ODBC credentials in .env file

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
