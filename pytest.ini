[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
qt_api = pyqt6
# pytest-timeout applies per test (includes setup/call/teardown because
# timeout_func_only=False by default). Using `signal` on POSIX allows a single
# timed-out test to fail while the rest of the suite continues.
timeout = 60
timeout_method = signal

markers =
    # Test Type Markers
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, filesystem, real components)
    e2e: End-to-end tests (full workflows)
    ui: UI tests
    qt: Qt UI tests

    # Speed Markers
    slow: Slow running tests (>30 seconds)
    fast: Fast tests (<5 seconds)

    # Build Markers
    pyinstaller: PyInstaller integration tests
    build: Build-related tests

    # Component Markers
    database: Database-related tests
    dispatch: Dispatch/orchestration tests
    conversion: File conversion tests
    backend: Backend tests (FTP, Email, Copy)
    gui: GUI component tests

    # Workflow Markers
    workflow: Complete workflow tests
    upgrade: Database upgrade tests

    # New Test Category Markers (Added March 2026)
    performance: Performance benchmark tests
    security: Security validation tests
    migration: Database migration tests
    plugin: Plugin system tests
    stress: Stress/load tests
    compatibility: Backward compatibility tests
    backward_compatibility: Tests verifying drop-in replacement capability

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
