[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
extend-ignore = ["E203"]
select = ["E", "F", "W", "I", "C90"]

[tool.ruff.lint.per-file-ignores]
"archive/*" = ["E402", "E501", "F841", "C90", "ANN", "UP006", "UP045", "FBT", "D413"]
"adapters/sqlite/repositories/*" = ["ANN401", "FBT001", "FBT002", "FBT003"]
"scripts/*" = ["E402", "E501", "FBT001", "FBT002", "FBT003"]
"scripts/self_test.py" = ["C90"]
"scripts/mover.py" = ["C90"]
"tests/*" = ["E402", "E501", "E712", "E731", "E741", "C90", "ANN", "UP006", "UP045", "FBT", "D413"]
"migrations/*" = ["E402", "E501", "C90"]
"migrations/folders_database_migrator.py" = ["C90"]
"main_qt.py" = ["E402"]
"interface/qt/dialogs/edit_folders/dynamic_edi_builder.py" = ["E402"]
