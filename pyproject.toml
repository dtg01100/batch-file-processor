[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
extend-ignore = ["E203"]
select = ["E", "F", "W", "I", "C90"]

[tool.ruff.lint.per-file-ignores]
"archive/*" = ["E402", "E501", "F841", "C90"]
"scripts/*" = ["E402", "E501"]
"scripts/self_test.py" = ["C90"]
"scripts/mover.py" = ["C90"]
"tests/*" = ["E402", "E501", "E712", "E731", "E741", "C90"]
"migrations/*" = ["E402", "E501", "C90"]
"migrations/folders_database_migrator.py" = ["C90"]
"main_qt.py" = ["E402"]
"backend/database/*" = ["E501"]
"backend/email_backend.py" = ["E501"]
"backend/ftp_backend.py" = ["E501"]
"core/database/*" = ["E501"]
"core/edi/*" = ["E501"]
"core/utils/*" = ["E501"]
"dispatch/converters/*" = ["E501"]
"dispatch/error_handler.py" = ["E501"]
"dispatch/orchestrator.py" = ["E501"]
"dispatch/pipeline/*" = ["E501"]
"interface/form/*" = ["E501"]
"interface/models/*" = ["E501"]
"interface/operations/*" = ["E501"]
"interface/plugins/*" = ["E501"]
"interface/qt/*" = ["E501"]
"interface/services/*" = ["E501"]
"interface/qt/dialogs/edit_folders/dynamic_edi_builder.py" = ["E402"]
